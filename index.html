<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>С 8 Марта! </title>

  <style>
    :root{
      --glass: rgba(255,255,255,0.22);
      --glass-border: rgba(255,255,255,0.35);
      --text: #6b3a2c;      /* тёплый коричневый */
      --muted: rgba(107,58,44,0.72);
    }

    body{
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Segoe UI","Segoe UI Emoji","Apple Color Emoji","Noto Color Emoji",sans-serif;
      color: var(--text);
      overflow: hidden;

      background:
        radial-gradient(1200px 800px at 20% 20%, rgba(255,255,255,0.28), transparent 55%),
        radial-gradient(900px 700px at 80% 30%, rgba(255,255,255,0.18), transparent 55%),
        linear-gradient(135deg, #ffd6c9, #ffbfa3);
      background-size: cover;

      opacity: 0;
      animation: fadeIn 1.2s forwards;
      position: relative;
    }

    @keyframes fadeIn { to { opacity: 1; } }

    /* лёгкое “движение воздуха” */
    .glow{
      position: absolute;
      inset: -20%;
      background:
        radial-gradient(circle at 25% 30%, rgba(255,255,255,0.20), transparent 42%),
        radial-gradient(circle at 70% 55%, rgba(255,255,255,0.16), transparent 48%),
        radial-gradient(circle at 40% 80%, rgba(255,255,255,0.10), transparent 50%);
      animation: drift 10s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes drift{
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(2%, -2%) scale(1.03); }
    }

    /* фоновые лепестки */
    .bg{
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
    }

    .petal{
      position:absolute;
      width: 320px;
      height: 320px;
      border-radius: 40% 60% 55% 45% / 45% 45% 55% 55%;
      filter: blur(2px);
      opacity: 0.24;
      background:
        radial-gradient(circle at 30% 30%,
          rgba(255,255,255,0.55),
          rgba(255,150,120,0.35) 40%,
          rgba(255,120,100,0.10) 70%,
          transparent 72%);
      animation: floatSlow 14s ease-in-out infinite alternate;
    }

    .p1{ left: -140px; top: -120px; transform: rotate(12deg); }
    .p2{ right: -160px; top: 40px; transform: rotate(-22deg); animation-duration: 16s; opacity: 0.20; }
    .p3{ left: 10%; bottom: -180px; transform: rotate(30deg); animation-duration: 18s; opacity: 0.18; }
    .p4{ right: 12%; bottom: -200px; transform: rotate(-8deg); animation-duration: 20s; opacity: 0.16; }

    @keyframes floatSlow{
      from { transform: translateY(0) rotate(0deg) scale(1); }
      to   { transform: translateY(-18px) rotate(6deg) scale(1.03); }
    }

    /* “большие цветы” */
    .bigflower{
      position:absolute;
      width:240px;
      height:240px;
      border-radius:50%;
      background:
        radial-gradient(circle at 30% 30%,
          rgba(255,255,255,0.65) 0 18%,
          rgba(255,160,130,0.45) 35%,
          rgba(255,120,100,0.15) 55%,
          transparent 72%);
      opacity:0.20;
      filter: blur(1px);
      animation: floatFlower 14s ease-in-out infinite alternate;
    }

    .f1{ left:-90px; top:-80px; }
    .f2{ right:-110px; top:22%; width:280px; height:280px; opacity:0.16; animation-duration:18s; }
    .f3{ left:30%; bottom:-120px; width:220px; height:220px; opacity:0.14; animation-duration:20s; }

    @keyframes floatFlower{
      from{ transform: translateY(0) rotate(0deg) scale(1); }
      to  { transform: translateY(-18px) rotate(8deg) scale(1.04); }
    }

    /* карточка */
    .card{
      background: rgba(255, 245, 240, 0.92);
      padding: 40px 60px;
      border-radius: 22px;
      text-align: center;
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.55);

      position: relative;
      z-index: 2;
      box-shadow: 0 18px 60px rgba(0,0,0,0.16);
      width: min(720px, calc(100vw - 32px));
    }

    h1{
      margin: 0 0 12px;
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 800;

      background: linear-gradient(135deg, #5c2f22, #a85c3d, #7a3e2d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;

      text-shadow: 0 2px 14px rgba(255, 120, 90, 0.28);
    }

    /* ВАЖНО: p без градиента, чтобы эмодзи 100% оставались цветными */
    p{
      margin: 0;
      font-size: clamp(16px, 2.4vw, 18px);
      line-height: 1.65;
      color: var(--text);
      text-shadow: 0 1px 10px rgba(255, 120, 90, 0.16);
    }

    .btn{
      margin-top:16px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:14px 20px;
      border:none;
      border-radius:999px;
      cursor:pointer;
      font-size:16px;
      font-weight: 700;
      color:#2b2b2b;
      background: rgba(255,255,255,0.88);
      box-shadow: 0 10px 25px rgba(0,0,0,0.12);
      transition: transform .12s ease, background .12s ease;
      user-select:none;
    }
    .btn:hover{ transform: translateY(-1px); background: rgba(255,255,255,0.94); }
    .btn:active{ transform: translateY(0px) scale(0.99); }
    .btn[disabled]{ opacity:.8; cursor: default; transform:none; }

    .hint{
      margin-top:10px;
      font-size: 13px;
      color: var(--muted);
    }

    /* падающие эмодзи */
    .float{
      font-family: "Segoe UI Emoji","Apple Color Emoji","Noto Color Emoji",sans-serif;
      position:absolute;
      top:-10vh;
      z-index:1;
      pointer-events:none;
      will-change: transform;
      animation-name: fall;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
      filter: drop-shadow(0 6px 12px rgba(0,0,0,0.10));
      /* чтобы не становились “коричневыми” от клипа текста */
      background: none !important;
      -webkit-text-fill-color: initial !important;
      color: initial !important;
    }

    @keyframes fall{
      from { transform: translateY(-15vh) rotate(0deg); }
      to   { transform: translateY(120vh) rotate(360deg); }
    }
  </style>
</head>

<body>
  <div class="glow"></div>

  <div class="bg">
    <div class="petal p1"></div>
    <div class="petal p2"></div>
    <div class="petal p3"></div>
    <div class="petal p4"></div>

    <div class="bigflower f1"></div>
    <div class="bigflower f2"></div>
    <div class="bigflower f3"></div>
  </div>

  <div class="card">
    <h1 id="title"></h1>
    <p id="message"></p>

    <button class="btn" id="playBtn">▶ Включить музыку</button>
    <div class="hint" id="hint">Если звук не пошёл — нажми кнопку ещё раз (браузеры иногда вредничают).</div>

    <audio id="music" preload="auto" playsinline>
      <source src="Akvarium_-_Ne_mogu_otorvat_glaz_ot_tebya_47955055.mp3" type="audio/mpeg">
    </audio>
  </div>

  <script>
    // 1) Текст
    const titleText = "С 8 Марта 💐";
    const msgText   = "Пусть этот день будет тёплым, лёгким и светлым. Улыбок, заботы и хорошего настроения ❤️";

    function typeInto(el, text, speed=55){
      el.textContent = "";
      let i = 0;
      const timer = setInterval(() => {
        el.textContent += text.charAt(i);
        i++;
        if(i >= text.length) clearInterval(timer);
      }, speed);
    }

    typeInto(document.getElementById("title"), titleText, 65);
    setTimeout(() => typeInto(document.getElementById("message"), msgText, 25), 650);

    // 2) Музыка по кнопке + ограничение громкости
    const btn = document.getElementById("playBtn");
    const hint = document.getElementById("hint");
    const music = document.getElementById("music");

    const MAX_VOL = 0.20; // 20% (можешь поставить 0.7 если хочешь 70%)

    btn.addEventListener("click", async () => {
      try{
        music.volume = MAX_VOL;
        await music.play();
        btn.textContent = "🎵 Музыка играет";
        btn.disabled = true;
        hint.textContent = "Приятного прослушивания и еще раз с праздником! 🌸";
      }catch(e){
        btn.textContent = "Нажми ещё раз ▶️";
      }
    });

    // 3) Падающие эмодзи
    const emojis = ["🌸","🌷","🌼","💗","🌺","💖","💐","🩷"];
    const count = 26;

    for(let i=0; i<count; i++){
      const el = document.createElement("div");
      el.className = "float";
      el.textContent = emojis[Math.floor(Math.random()*emojis.length)];

      const left = Math.random() * 100;       // vw
      const size = 14 + Math.random()*16;     // px
      const duration = 6 + Math.random()*9;   // s
      const delay = Math.random()*4;          // s

      el.style.left = left + "vw";
      el.style.fontSize = size + "px";
      el.style.animationDuration = duration + "s";
      el.style.animationDelay = (-delay) + "s";
      el.style.opacity = (0.45 + Math.random()*0.45).toFixed(2);

      document.body.appendChild(el);
    }
  </script>
</body>
</html>
