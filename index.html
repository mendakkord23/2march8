
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>С 8 Марта 💐</title>

  <style>
    :root{
      --glass: rgba(255,255,255,0.22);
      --glass-border: rgba(255,255,255,0.35);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.78);
    }

 body   {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ffd6c9, #ffbfa3);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    font-family: 'Segoe UI', sans-serif;
    color: #7a3e2f;
    overflow: hidden;
}
    .flower {
    position: absolute;
    width: 18px;
    height: 18px;
    background: radial-gradient(circle, #ff9e80 0%, #ff6f61 60%);
    border-radius: 50%;
    animation: float 12s infinite linear;
    opacity: 0.5;
}

      /* нежный градиент */
      background:
        radial-gradient(1200px 800px at 20% 20%, rgba(255,255,255,0.25), transparent 55%),
        radial-gradient(900px 700px at 80% 30%, rgba(255,255,255,0.18), transparent 55%),
        linear-gradient(135deg, #ffb7c5, #ffd6a5, #d7f7ff, #e6d7ff);
      background-size: cover;

      opacity:0;
      animation: fadeIn 1.6s forwards;
    }

    @keyframes fadeIn { to { opacity:1; } }

    .card {
    background: rgba(255, 245, 240, 0.9);
    padding: 40px 60px;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(255, 140, 100, 0.3);
    text-align: center;
    backdrop-filter: blur(5px);
}
    

    h1{
  margin: 0 0 12px;
  font-size: clamp(28px, 4vw, 42px);
  font-weight: 600;

  background: linear-gradient(135deg, #7a3e2d, #a85c3d, #5c2f22);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  text-shadow:
    0 2px 6px rgba(120,60,40,0.25);
}

    p{
  font-size: clamp(16px, 2.4vw, 18px);
  line-height: 1.6;

  background: linear-gradient(135deg, #6b3a2c, #8f4e3a);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  text-shadow:
    0 1px 4px rgba(120,70,50,0.2);
}

    .btn{
      margin-top:16px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:14px 20px;
      border:none;
      border-radius:999px;
      cursor:pointer;
      font-size:16px;
      color:#2b2b2b;
      background: rgba(255,255,255,0.85);
      box-shadow: 0 10px 25px rgba(0,0,0,0.12);
      transition: transform .12s ease, background .12s ease;
      user-select:none;
    }
    .btn:hover{ transform: translateY(-1px); background: rgba(255,255,255,0.92); }
    .btn:active{ transform: translateY(0px) scale(0.99); }

    .hint{
      margin-top:10px;
      font-size: 13px;
      opacity: 0.85;
    }

    /* летающие элементы */
    .float{
      position:absolute;
      top:-10vh;
      z-index:1;
      pointer-events:none;
      will-change: transform;
      animation-name: fall;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
      filter: drop-shadow(0 6px 12px rgba(0,0,0,0.10));
    }

    @keyframes fall{
      from { transform: translateY(-15vh) rotate(0deg); }
      to   { transform: translateY(120vh) rotate(360deg); }
    }

    /* чуть “живой” фон */
    .glow{
      position:absolute;
      inset:-20%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.12), transparent 45%),
                  radial-gradient(circle at 70% 60%, rgba(255,255,255,0.10), transparent 50%);
      animation: drift 10s ease-in-out infinite alternate;
      z-index:0;
      pointer-events:none;
    }
    @keyframes drift{
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(2%, -2%) scale(1.03); }
/* --- Читаемость + мягкое свечение текста --- */
h1{
  text-shadow: 0 2px 14px rgba(255, 120, 90, 0.45);
}
p{
  text-shadow: 0 1px 10px rgba(255, 120, 90, 0.22);
}

/* --- Нежное “свечение воздуха” --- */
.glow-orb{
  position: absolute;
  inset: -20%;
  background:
    radial-gradient(circle at 25% 30%, rgba(255,255,255,0.22), transparent 42%),
    radial-gradient(circle at 70% 55%, rgba(255,255,255,0.18), transparent 48%),
    radial-gradient(circle at 40% 80%, rgba(255,255,255,0.12), transparent 50%);
  animation: drift 10s ease-in-out infinite alternate;
  pointer-events: none;
  z-index: 0;
}

@keyframes drift{
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(2%, -2%) scale(1.03); }
}

/* --- Фоновая графика (лепестки + цветочки) --- */
.bg{
  position: absolute;
  inset: 0;
  overflow: hidden;
  z-index: 0;
  pointer-events: none;
}

/* лепестки-градиенты */
.petal{
  position:absolute;
  width: 320px;
  height: 320px;
  border-radius: 40% 60% 55% 45% / 45% 45% 55% 55%;
  filter: blur(2px);
  opacity: 0.28;
  transform: rotate(12deg);
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.55), rgba(255,150,120,0.35) 40%, rgba(255,120,100,0.10) 70%, transparent 72%);
  animation: floatSlow 14s ease-in-out infinite alternate;
}

.p1{ left: -140px; top: -120px; }
.p2{ right: -160px; top: 40px; transform: rotate(-22deg); animation-duration: 16s; opacity: 0.22; }
.p3{ left: 10%; bottom: -180px; transform: rotate(30deg); animation-duration: 18s; opacity: 0.20; }
.p4{ right: 12%; bottom: -200px; transform: rotate(-8deg); animation-duration: 20s; opacity: 0.18; }

@keyframes floatSlow{
  from { transform: translateY(0) rotate(var(--r, 12deg)) scale(1); }
  to   { transform: translateY(-18px) rotate(calc(var(--r, 12deg) + 6deg)) scale(1.03); }
}

/* “графические” цветы (векторные, через псевдоэлементы) */
.flower{
  position:absolute;
  width: 220px;
  height: 220px;
  opacity: 0.20;
  filter: blur(0.3px);
  animation: spinSoft 22s linear infinite;
}
.flower::before,
.flower::after{
  content:"";
  position:absolute;
  inset: 0;
  border-radius: 50%;
  background:
    radial-gradient(circle, rgba(255,255,255,0.85) 0 18%, transparent 19%),
    radial-gradient(circle, rgba(255,170,140,0.55) 0 34%, transparent 35%),
    conic-gradient(from 0deg,
      rgba(255,170,140,0.0) 0 5%,
      rgba(255,170,140,0.35) 5% 12%,
      rgba(255,170,140,0.0) 12% 20%,
      rgba(255,140,120,0.32) 20% 28%,
      rgba(255,140,120,0.0) 28% 36%,
      rgba(255,170,140,0.30) 36% 44%,
      rgba(255,170,140,0.0) 44% 100%);
}
.flower::after{
  inset: 18px;
  opacity: 0.75;
  filter: blur(0.5px);
}

.f1{ left: -60px; bottom: -70px; }
.f2{ right: -80px; top: -40px; width: 260px; height: 260px; animation-duration: 26s; opacity: 0.16; }
.f3{ right: 8%; bottom: -90px; width: 180px; height: 180px; animation-duration: 28s; opacity: 0.14; }

@keyframes spinSoft{
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

/* --- Поднимем карточку над фоном --- */
.card{
  position: relative;
  z-index: 2;
  box-shadow: 0 18px 60px rgba(0,0,0,0.16);
}
 .bg{
  position:absolute;
  inset:0;
  z-index:0;
  pointer-events:none;
  overflow:hidden;
}

.bigflower{
  position:absolute;
  width:240px;
  height:240px;
  border-radius:50%;
  background:
    radial-gradient(circle at 30% 30%,
      rgba(255,255,255,0.65) 0 18%,
      rgba(255,160,130,0.45) 35%,
      rgba(255,120,100,0.15) 55%,
      transparent 72%);
  opacity:0.22;
  filter: blur(1px);
  animation: floatFlower 14s ease-in-out infinite alternate;
}

.f1{ left:-90px; top:-80px; }
.f2{ right:-110px; top:22%; width:280px; height:280px; opacity:0.18; animation-duration:18s; }
.f3{ left:30%; bottom:-120px; width:220px; height:220px; opacity:0.16; animation-duration:20s; }

@keyframes floatFlower{
  from{ transform: translateY(0) rotate(0deg) scale(1); }
  to  { transform: translateY(-18px) rotate(8deg) scale(1.04); }
}

.card{ position:relative; z-index:2; }
  </style>
</head>

<body>
<div class="bg">
  <div class="bigflower f1"></div>
  <div class="bigflower f2"></div>
  <div class="bigflower f3"></div>
</div>

  <div class="glow"></div>

  <div class="card">
    <h1 id="title"></h1>
    <p id="message"></p>

    <button class="btn" id="playBtn">
      ▶️ Включить музыку
    </button>

    <div class="hint">Если звук не пошёл — нажми кнопку ещё раз (браузеры иногда вредничают).</div>

    <audio id="music" preload="auto">
      <!-- ВАЖНО: тут должно быть точное имя твоего mp3 файла в репозитории -->
      <source src="Akvarium_-_Ne_mogu_otorvat_glaz_ot_tebya_47955055.mp3" type="audio/mpeg">
    </audio>
  </div>

  <script>
    // 1) Нежный "печатный" текст (без имён)
    const titleText = "С 8 Марта 💐";
    const msgText   = "Пусть этот день будет тёплым, лёгким и светлым. Улыбок, заботы и хорошего настроения ❤️";

    function typeInto(el, text, speed=55){
      el.textContent = "";
      let i = 0;
      const timer = setInterval(() => {
        el.textContent += text.charAt(i);
        i++;
        if(i >= text.length) clearInterval(timer);
      }, speed);
    }

    typeInto(document.getElementById("title"), titleText, 65);
    setTimeout(() => typeInto(document.getElementById("message"), msgText, 25), 650);

    // 2) Воспроизведение по кнопке + громкость
    const btn = document.getElementById("playBtn");
    const music = document.getElementById("music");

    btn.addEventListener("click", async () => {
      try{
        music.volume = 0.20; // <-- тут тише/громче: 0.15..0.35 обычно идеально
        await music.play();
        btn.textContent = "🎵 Музыка играет";
        btn.disabled = true;
        btn.style.opacity = "0.80";
        btn.style.cursor = "default";
      }catch(e){
        // если браузер капризничает — просто повторный клик поможет
        btn.textContent = "Нажми ещё раз ▶️";
      }
    });

    // 3) Летающие цветочки + маленькие сердечки (универсально, мило)
    const emojis = ["🌸","🌷","🌼","💗","🌺","💖"];
    const count = 26;

    for(let i=0; i<count; i++){
      const el = document.createElement("div");
      el.className = "float";
      el.textContent = emojis[Math.floor(Math.random()*emojis.length)];

      const left = Math.random() * 100; // vw
      const size = 14 + Math.random()*14; // px
      const duration = 6 + Math.random()*8; // s
      const delay = Math.random()*4; // s

      el.style.left = left + "vw";
      el.style.fontSize = size + "px";
      el.style.animationDuration = duration + "s";
      el.style.animationDelay = (-delay) + "s"; // чтобы часть уже "летела"
      el.style.opacity = (0.45 + Math.random()*0.45).toFixed(2);

      document.body.appendChild(el);
    }
  </script>
</body>
</html>
